services:
  postgres:
    image: postgres:16-alpine
    container_name: dental_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dental_clinic}
      POSTGRES_USER: ${DB_USER:-dental_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-DentalSecure2024!}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dental_admin} -d ${DB_NAME:-dental_clinic}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dental_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dental_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dental_network

  frontend:
    image: nginx:alpine
    container_name: dental_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - dental_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  dental_network:
    driver: bridge
